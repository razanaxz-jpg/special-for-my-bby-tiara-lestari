<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk my bby tiara lestari ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #feada6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.25);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.35);
        }

        .heart-box {
            position: relative;
            width: 100px;
            height: 90px;
            margin: 20px auto 30px;
            cursor: pointer;
        }

        .heart {
            position: relative;
            width: 80px;
            height: 80px;
            background-color: #ff2a5f;
            transform: rotate(-45deg);
            margin: 0 auto;
            animation: pulseHeart 1.2s infinite ease-in-out;
            box-shadow: 0 0 25px rgba(255, 42, 95, 0.6);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: #ff2a5f;
            border-radius: 50%;
        }

        .heart::before {
            top: -40px;
            left: 0;
        }

        .heart::after {
            left: 40px;
            top: 0;
        }

        @keyframes pulseHeart {
            0% {
                transform: rotate(-45deg) scale(0.95);
                box-shadow: 0 0 15px rgba(255, 42, 95, 0.5);
            }
            15% {
                transform: rotate(-45deg) scale(1.15);
                box-shadow: 0 0 35px rgba(255, 42, 95, 0.8);
            }
            30% {
                transform: rotate(-45deg) scale(0.95);
                box-shadow: 0 0 20px rgba(255, 42, 95, 0.6);
            }
            45% {
                transform: rotate(-45deg) scale(1.25);
                box-shadow: 0 0 45px rgba(255, 42, 95, 0.9);
            }
            60%, 100% {
                transform: rotate(-45deg) scale(0.95);
                box-shadow: 0 0 15px rgba(255, 42, 95, 0.5);
            }
        }

        h1 {
            color: #d81b60;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: #4a4a4a;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(255, 77, 109, 0.35);
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover {
            background: linear-gradient(135deg, #c9184a, #ff4d6d);
            transform: scale(1.04);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            color: #ff4d6d;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .modal-content p {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="card">
        <h1>Semangat Beraktivitas bby ❤️</h1>
        
        <div class="heart-box" onclick="explodeHearts()">
            <div class="heart"></div>
        </div>

        <p id="quote">"Setiap hari bersamamu adalah hari favoritku. Selamat beraktivitas bby"</p>

        <div class="btn-group">
            <button onclick="kirimPesan()">Klik Kalau Kangen 💌</button>
            <button onclick="gantiQuote()" style="background: linear-gradient(135deg, #ff85a1, #fbb1bd);">Pesan Rahasia 🎁</button>
        </div>
    </div>

    <div class="modal" id="loveModal">
        <div class="modal-content">
            <h2>Pesan Buat Kamu </h2>
            <p>Aku juga kangen banget sama kamu! Jangan lupa mamm dan minum air putih yawww bby 💕</p>
            <button onclick="closeModal()">Tutup ❤️</button>
        </div>
    </div>

    <script>
        const quotes = [
            "Setiap hari bersamamu adalah hari favoritku. Selamat beraktivitas bby ",
            "Jangan terlalu capek ya hari ini, ingat ada aku yang selalu doain dan nungguin kamu 💖",
            "Kamu itu alasan aku tersenyum tiap pagi. Semangat terus yaww pacarku yang paling keren",
            "Kalau capek, istirahat dulu yaa bby ",
            "Semoga harimu menyenangkan yawww bby. Miss you so much! ✨ ❤️"
        ];
        let quoteIndex = 0;

        function gantiQuote() {
            quoteIndex = (quoteIndex + 1) % quotes.length;
            document.getElementById("quote").innerText = `"${quotes[quoteIndex]}"`;
            explodeHearts();
        }

        function kirimPesan() {
            document.getElementById("loveModal").classList.add("show");
            explodeHearts();
        }

        function closeModal() {
            document.getElementById("loveModal").classList.remove("show");
        }

        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || canvas.height + 20;
                this.size = Math.random() * 15 + 8;
                this.speedY = Math.random() * 1.5 + 0.8;
                this.speedX = Math.random() * 1 - 0.5;
                this.opacity = Math.random() * 0.7 + 0.3;
                this.color = `hsl(${Math.random() * 20 + 340}, 100%, 65%)`;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.size / 20, this.size / 20);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-10, -10, -20, 5, 0, 20);
                ctx.bezierCurveTo(20, 5, 10, -10, 0, 0);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.opacity > 0.01) this.opacity -= 0.003;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 35) particles.push(new Particle());

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].y < -20 || particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        function explodeHearts() {
            for (let i = 0; i < 20; i++) {
                const p = new Particle(window.innerWidth / 2, window.innerHeight / 2);
                p.speedY = (Math.random() - 0.5) * 6;
                p.speedX = (Math.random() - 0.5) * 6;
                p.size = Math.random() * 20 + 10;
                particles.push(p);
            }
        }
    </script>
</body>
</html>
